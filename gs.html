<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Galatasaray</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&display=swap');
        
        :root {
            --gs-red: #d32f2f;
            --gs-gold: #ffc107;
            --bg-dark: #0a0a0c;
            --glass: rgba(255, 255, 255, 0.03);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        .sidebar { 
            width: 360px; background: rgba(15, 15, 18, 0.95); 
            border-right: 1px solid rgba(255,255,255,0.1); 
            display: flex; flex-direction: column; backdrop-filter: blur(10px);
        }
        
        .brand { padding: 40px; font-size: 1.4rem; font-weight: 700; color: var(--gs-gold); border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }

        .filter-grid { padding: 20px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .filter-btn { 
            padding: 10px; border: none; border-radius: 8px; background: var(--glass); 
            color: var(--text-dim); cursor: pointer; font-size: 0.75rem; font-weight: 500; transition: 0.4s;
        }
        .filter-btn.active { background: var(--gs-red); color: white; box-shadow: 0 4px 15px rgba(211,47,47,0.3); }

        .match-list { flex: 1; overflow-y: auto; padding: 0 20px 20px 20px; }
        .match-card { 
            background: var(--glass); padding: 18px; border-radius: 12px; margin-bottom: 12px; 
            cursor: pointer; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.03);
            transition: transform 0.2s, border 0.3s;
        }
        .match-card:hover { transform: translateY(-2px); border-color: var(--gs-gold); }

        .content { flex: 1; padding: 80px; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, #1a1a1e 0%, #0a0a0c 100%); }
        .detail-view { width: 100%; max-width: 600px; text-align: center; }
        .match-title { font-size: 2.2rem; font-weight: 700; margin-bottom: 30px; }
        .stat-card { 
            background: var(--glass); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="brand">GALATASARAY</div>
    <div class="filter-grid" id="filter-bar">
        <button class="filter-btn active" onclick="renderList('Hepsi', this)">Hepsi</button>
        <button class="filter-btn" onclick="renderList('Süper Lig', this)">Süper Lig</button>
        <button class="filter-btn" onclick="renderList('UCL', this)">UCL</button>
        <button class="filter-btn" onclick="renderList('Hazırlık Maçları', this)">Hazırlık Maçları</button>
        <button class="filter-btn" onclick="renderList('Türkiye Kupası', this)">Türkiye Kupası</button>
        <button class="filter-btn" onclick="renderList('Süper Kupa', this)">Süper Kupa</button>
    </div>
    <div id="match-list" class="match-list"></div>
</div>

<div class="content">
    <div id="detail-view" class="detail-view">
        <h2 style="color: var(--text-dim);">Maç detayı için seçim yapın</h2>
    </div>
</div>

<script>
    const matches = [
        { id: 1, lig: 'Hazırlık Maçları', rakip: 'AC Monza', skor: '', durum: '', tarih: '24.07.2026', saat: '21:00', stad: 'Raiffeisen Arena', goller: ' ' },
 { id: 2, lig: 'Hazırlık Maçları', rakip: 'Venezia', skor: '', durum: '', tarih: '27.07.2026', saat: '21:00', stad: 'Hofmann Personal Stadion', goller: ' ' },
    { id: 3, lig: 'Hazırlık Maçları', rakip: 'Villarreal', skor: '', durum: '', tarih: '08.08.2026', saat: '21:00', stad: 'RAMS Park', goller: ' ' },
    ];

    function renderList(filter, btn) {
        if (btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        const list = document.getElementById('match-list');
        const filtered = filter === 'Hepsi' ? matches : matches.filter(m => m.lig === filter);
        
        list.innerHTML = filtered.map(m => `
            <div class="match-card" onclick="showDetail(${m.id})">
                <div style="width:8px; height:8px; border-radius:50%; background:${m.durum === 'W' ? '#22c55e' : m.durum === 'L' ? '#d32f2f' : m.durum === 'D' ? '#ffc107' : '#555'}"></div>
                <div>
                    <div style="font-size:0.7rem; color:var(--text-dim)">${m.tarih}</div>
                    <div style="font-weight:600">${m.skor ? 'Galatasaray ' + m.skor + ' ' + m.rakip : 'Galatasaray vs ' + m.rakip}</div>
                </div>
            </div>
        `).join('');
    }

    function showDetail(id) {
        const m = matches.find(x => x.id === id);
        const title = m.skor ? `Galatasaray ${m.skor} ${m.rakip}` : `Galatasaray vs ${m.rakip}`;
        
        document.getElementById('detail-view').innerHTML = `
            <div style="color:var(--gs-gold); text-transform:uppercase; font-size:0.8rem; margin-bottom:10px">${m.lig}</div>
            <div class="match-title">${title}</div>
            <div class="stat-card">
                <div><div style="color:var(--text-dim); font-size:0.7rem">Tarih</div>${m.tarih}</div>
                <div><div style="color:var(--text-dim); font-size:0.7rem">Saat</div>${m.saat}</div>
                <div><div style="color:var(--text-dim); font-size:0.7rem">Stadyum</div>${m.stad}</div>
                <div style="grid-column:span 3"><div style="color:var(--text-dim); font-size:0.7rem">Goller</div>${m.goller}</div>
            </div>
        `;
    }
    renderList('Hepsi');
</script>
</body>
</html>
