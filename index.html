    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&display=swap');
        :root { --gs-red: #d32f2f; --gs-gold: #ffc107; --bg-dark: #0a0a0c; --glass: rgba(255, 255, 255, 0.05); --text-main: #ffffff; --text-dim: #a0a0a0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 360px; background: rgba(15, 15, 18, 0.95); border-right: 1px solid #222; display: flex; flex-direction: column; }
        .content { flex: 1; padding: 60px; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, #1a1a1e 0%, #0a0a0c 100%); overflow-y: auto; }
        .top-nav { display: flex; border-bottom: 1px solid #222; }
        .nav-btn { flex: 1; padding: 15px; border: none; background: #1a1a1e; color: #777; cursor: pointer; font-weight: 700; }
        .nav-btn.active { background: #0a0a0c; color: var(--gs-gold); }
        .filter-grid { padding: 15px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .filter-btn { padding: 10px; border: none; border-radius: 8px; background: var(--glass); color: var(--text-dim); cursor: pointer; font-size: 0.75rem; }
        .filter-btn.active { background: var(--gs-red); color: white; }
        .match-list { flex: 1; overflow-y: auto; padding: 15px; }
        .match-card { background: var(--glass); padding: 15px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .match-card:hover { border-color: var(--gs-gold); border-style: solid; border-width: 1px; }
        .match-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 25px; }
        .stat-card { background: var(--glass); padding: 25px; border-radius: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left; }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; }
            .sidebar { width: 100% !important; height: auto !important; border-right: none !important; }
            .content { padding: 20px !important; }
            .sidebar.hidden { display: none !important; }
            .content.full-screen { display: flex !important; width: 100% !important; height: 100vh !important; position: fixed; top: 0; left: 0; background: var(--bg-dark) !important; padding: 40px 20px !important; z-index: 100; }
        }
    </style>
</head>

    function renderList(filter, btn) {
        if (btn) {

        }
        const filtered = filter === 'Hepsi' ? matches : matches.filter(m => m.lig === filter);
